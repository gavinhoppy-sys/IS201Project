<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bike – Desert Run</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0a00;
    color: #f5deb3;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1rem;
  }

  h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    color: #d2691e;
    text-shadow: 2px 3px 8px rgba(0,0,0,.6);
    margin-bottom: .3rem;
    letter-spacing: 1px;
  }

  .subtitle { font-size: .85rem; color: #a0826d; margin-bottom: .8rem; }

  #game-wrap {
    position: relative;
    border: 4px solid #8b4513;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(210,105,30,.35);
    touch-action: none;
  }

  canvas { display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(26,10,0,.80);
    text-align: center;
    padding: 1.5rem;
  }
  #overlay.hidden { display: none; }

  #overlay h2 {
    font-size: clamp(1.4rem, 5vw, 2.1rem);
    color: #d2691e;
    margin-bottom: .5rem;
  }
  #overlay p {
    font-size: clamp(.88rem, 2.5vw, 1.05rem);
    color: #f5deb3;
    margin-bottom: 1rem;
    line-height: 1.5;
  }
  #score-display {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 700;
    color: #ffd700;
    margin-bottom: .8rem;
  }

  .btn-play {
    background: linear-gradient(135deg, #8b4513, #d2691e);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: .7rem 2.2rem;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
    transition: transform .15s;
  }
  .btn-play:hover { transform: translateY(-3px); }

  #hud {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,.8);
    pointer-events: none;
  }

  #controls-hint { font-size: .82rem; color: #a0826d; margin-top: .7rem; }

  .page-footer { margin-top: 1rem; font-size: .82rem; color: #a0826d; text-align: center; }
  .page-footer a { color: #d2691e; text-decoration: none; }
  .page-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>&#x1F3CD; Flappy Bike</h1>
<p class="subtitle">Desert Run — dodge the cactuses!</p>

<div id="game-wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">Score: <span id="live-score">0</span></div>
  <div id="overlay">
    <h2 id="overlay-title">Flappy Bike</h2>
    <p id="overlay-msg">Guide your dirt bike through the desert cactuses.<br>Don't crash into the spines — or the ground!</p>
    <div id="score-display" style="display:none"></div>
    <button class="btn-play" id="start-btn">&#9654; Start Riding</button>
  </div>
</div>

<p id="controls-hint">
  <kbd>Space</kbd> / <kbd>&uarr;</kbd> &nbsp;|&nbsp; Tap or click to jump
</p>

<div class="page-footer">
  <a href="dirtbike.html">&larr; Back to Dirt Bike Page</a>
  &nbsp;&bull;&nbsp;
  <a href="index.html">Portfolio</a>
</div>

<script>
"use strict";

/* ── Canvas & DOM ── */
const canvas       = document.getElementById('gameCanvas');
const ctx          = canvas.getContext('2d');
const overlay      = document.getElementById('overlay');
const startBtn     = document.getElementById('start-btn');
const liveScoreEl  = document.getElementById('live-score');
const scoreDispEl  = document.getElementById('score-display');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg   = document.getElementById('overlay-msg');

/* ── Responsive canvas size ── */
function resize() {
    canvas.width  = Math.min(window.innerWidth - 32, 520);
    canvas.height = Math.round(canvas.width * 0.65);   // ~338px tall
}
resize();

/* ── Game constants (recalculated on resize) ── */
let W, H, GRAVITY, JUMP_VEL, PIPE_SPEED, GAP, GROUND_Y;
function calcConstants() {
    W          = canvas.width;
    H          = canvas.height;
    GRAVITY    = H * 1.8;       // px / s²
    JUMP_VEL   = -H * 0.65;    // px / s  (negative = upward)
    PIPE_SPEED = W * 0.22;      // px / s
    GAP        = H * 0.30;      // gap between top & bottom cactus
    GROUND_Y   = H * 0.93;      // y of ground surface
}
calcConstants();

/* ── Game state ── */
const S = { IDLE: 0, PLAY: 1, DEAD: 2 };
let state = S.IDLE;

let bikeY, bikeVY, pipes, score, best, lastTime, pipeTimer;
const BIKE_X  = W * 0.20;   // fixed horizontal position
const BIKE_W  = 48;
const BIKE_H  = 28;
const PIPE_W  = 54;
const PIPE_MS = 1800;       // ms between pipes

function initGame() {
    calcConstants();
    bikeY     = H * 0.42;
    bikeVY    = 0;
    pipes     = [];
    score     = 0;
    pipeTimer = PIPE_MS;    // spawn first pipe immediately on first frame
    liveScoreEl.textContent = '0';
    if (!best) best = 0;
}

/* ═══════════════════════════════════════════
   DRAW: DIRT BIKE (faces right)
═══════════════════════════════════════════ */
function drawBike(y) {
    const x = canvas.width * 0.20;   // use current canvas.width
    ctx.save();
    // Tilt nose up when jumping, down when falling
    const tilt = Math.max(-0.4, Math.min(0.55, bikeVY / (H * 1.2)));
    ctx.translate(x + BIKE_W / 2, y + BIKE_H / 2);
    ctx.rotate(tilt);
    ctx.translate(-BIKE_W / 2, -BIKE_H / 2);

    // Frame
    ctx.fillStyle = '#d2691e';
    ctx.beginPath();
    ctx.moveTo(4,  BIKE_H - 8);
    ctx.lineTo(44, BIKE_H - 8);
    ctx.lineTo(40, BIKE_H - 18);
    ctx.lineTo(8,  BIKE_H - 18);
    ctx.closePath();
    ctx.fill();

    // Engine block
    ctx.fillStyle = '#555';
    ctx.fillRect(18, BIKE_H - 22, 14, 9);

    // Exhaust (rear = left side when facing right)
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(10, BIKE_H - 12);
    ctx.lineTo(2,  BIKE_H - 10);
    ctx.lineTo(0,  BIKE_H - 5);
    ctx.stroke();

    // Handlebars (front = right side)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(40, BIKE_H - 18);
    ctx.lineTo(44, BIKE_H - 25);
    ctx.lineTo(38, BIKE_H - 25);
    ctx.stroke();

    // Seat
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(24, BIKE_H - 21, 11, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Rider body
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(26, BIKE_H - 30, 10, 9);

    // Helmet
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(34, BIKE_H - 30, 7, 0, Math.PI * 2);
    ctx.fill();

    // Visor
    ctx.fillStyle = '#00bfff';
    ctx.fillRect(38, BIKE_H - 33, 5, 4);

    // Wheels
    function wheel(cx, cy, r) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#111'; ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = '#aaa'; ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = '#333'; ctx.fill();
    }
    wheel(40, BIKE_H - 6, 9);   // front wheel (right)
    wheel(8,  BIKE_H - 6, 9);   // rear wheel  (left)

    // Front fork
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(38, BIKE_H - 14);
    ctx.lineTo(40, BIKE_H - 6);
    ctx.stroke();

    ctx.restore();
}

/* ═══════════════════════════════════════════
   DRAW: CACTUS (bottom — grows upward)
═══════════════════════════════════════════ */
function drawCactusUp(cx, tipY) {
    const tall = GROUND_Y - tipY;
    if (tall < 4) return;
    const tw = 20;
    const tx = cx - tw / 2;

    // Main trunk
    ctx.fillStyle = '#2d6a2d';
    ctx.fillRect(tx, tipY, tw, tall);

    // Rounded top
    ctx.beginPath();
    ctx.arc(cx, tipY, tw / 2, Math.PI, 0);
    ctx.fill();

    // Highlight
    ctx.fillStyle = '#3d8b3d';
    ctx.fillRect(cx - 3, tipY + tw / 2, 6, Math.max(0, tall - tw / 2 - 4));

    if (tall > 60) {
        // Left arm
        const lj = tipY + tall * 0.42;
        const lhl = Math.min(38, tall * 0.28);
        const lvl = Math.min(30, tall * 0.20);
        ctx.fillStyle = '#2d6a2d';
        ctx.fillRect(tx - lhl, lj - 9, lhl + tw / 2, 14);     // horiz
        ctx.fillRect(tx - lhl, lj - lvl - 9, 14, lvl + 9);    // vert up
        ctx.fillStyle = '#3d8b3d';
        ctx.fillRect(tx - lhl + 3, lj - 3, lhl - 6, 5);

        // Right arm
        const rj = tipY + tall * 0.64;
        const rhl = Math.min(34, tall * 0.25);
        const rvl = Math.min(26, tall * 0.18);
        ctx.fillStyle = '#2d6a2d';
        ctx.fillRect(tx + tw / 2, rj - 9, rhl + tw / 2, 14);
        ctx.fillRect(tx + tw / 2 + rhl, rj - rvl - 9, 14, rvl + 9);
        ctx.fillStyle = '#3d8b3d';
        ctx.fillRect(tx + tw / 2 + 3, rj - 3, rhl - 6, 5);
    }

    // Spines
    ctx.strokeStyle = '#e8d5a3';
    ctx.lineWidth = 1.2;
    for (let sy = GROUND_Y - 16; sy > tipY + 16; sy -= 24) {
        ctx.beginPath(); ctx.moveTo(tx,      sy); ctx.lineTo(tx - 8,  sy - 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + tw, sy); ctx.lineTo(tx + tw + 8, sy - 6); ctx.stroke();
    }
}

/* ═══════════════════════════════════════════
   DRAW: CACTUS (top — hangs downward)
═══════════════════════════════════════════ */
function drawCactusDown(cx, tipY) {
    const tall = tipY;
    if (tall < 4) return;
    const tw = 20;
    const tx = cx - tw / 2;

    // Main trunk
    ctx.fillStyle = '#2d6a2d';
    ctx.fillRect(tx, 0, tw, tall);

    // Rounded bottom tip
    ctx.beginPath();
    ctx.arc(cx, tipY, tw / 2, 0, Math.PI);
    ctx.fill();

    // Highlight
    ctx.fillStyle = '#3d8b3d';
    ctx.fillRect(cx - 3, 4, 6, Math.max(0, tall - tw / 2 - 4));

    if (tall > 60) {
        // Left arm (branches left + goes down)
        const lj = tall * 0.40;
        const lhl = Math.min(38, tall * 0.28);
        const lvl = Math.min(30, tall * 0.20);
        ctx.fillStyle = '#2d6a2d';
        ctx.fillRect(tx - lhl, lj - 5, lhl + tw / 2, 14);
        ctx.fillRect(tx - lhl, lj + 9, 14, lvl);              // vert down
        ctx.fillStyle = '#3d8b3d';
        ctx.fillRect(tx - lhl + 3, lj - 1, lhl - 6, 5);

        // Right arm
        const rj = tall * 0.62;
        const rhl = Math.min(34, tall * 0.25);
        const rvl = Math.min(26, tall * 0.18);
        ctx.fillStyle = '#2d6a2d';
        ctx.fillRect(tx + tw / 2, rj - 5, rhl + tw / 2, 14);
        ctx.fillRect(tx + tw / 2 + rhl, rj + 9, 14, rvl);
        ctx.fillStyle = '#3d8b3d';
        ctx.fillRect(tx + tw / 2 + 3, rj - 1, rhl - 6, 5);
    }

    // Spines (point downward)
    ctx.strokeStyle = '#e8d5a3';
    ctx.lineWidth = 1.2;
    for (let sy = 16; sy < tipY - 16; sy += 24) {
        ctx.beginPath(); ctx.moveTo(tx,      sy); ctx.lineTo(tx - 8,  sy + 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + tw, sy); ctx.lineTo(tx + tw + 8, sy + 6); ctx.stroke();
    }
}

/* ═══════════════════════════════════════════
   DRAW: BACKGROUND
═══════════════════════════════════════════ */
function drawBackground() {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0,   '#3a7bd5');
    sky.addColorStop(0.7, '#87ceeb');
    sky.addColorStop(1,   '#e8c87a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#a07830';
    for (let x = 0; x < W; x += 20) {
        ctx.fillRect(x, GROUND_Y + 4, 10, 3);
    }
}

/* ═══════════════════════════════════════════
   SPAWN / DRAW PIPES
═══════════════════════════════════════════ */
function spawnPipe() {
    const minTop = H * 0.10;
    const maxTop = GROUND_Y - GAP - H * 0.10;
    const topY   = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W + PIPE_W, topY, botY: topY + GAP, scored: false });
}

function drawPipes() {
    pipes.forEach(p => {
        const cx = p.x + PIPE_W / 2;
        drawCactusDown(cx, p.topY);
        drawCactusUp(cx, p.botY);
    });
}

/* ═══════════════════════════════════════════
   COLLISION
═══════════════════════════════════════════ */
function collides() {
    const bx  = canvas.width * 0.20;
    const PAD = 6;
    const bx1 = bx + PAD,          bx2 = bx + BIKE_W - PAD;
    const by1 = bikeY + PAD,       by2 = bikeY + BIKE_H - PAD;

    if (by2 >= GROUND_Y || by1 <= 0) return true;

    for (const p of pipes) {
        if (bx2 > p.x && bx1 < p.x + PIPE_W) {
            if (by1 < p.topY || by2 > p.botY) return true;
        }
    }
    return false;
}

/* ═══════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════ */
function update(dt) {
    // Physics (dt-scaled so frame-rate independent)
    bikeVY += GRAVITY * dt;
    bikeY  += bikeVY  * dt;

    // Pipes
    pipeTimer += dt * 1000;
    if (pipeTimer >= PIPE_MS) { spawnPipe(); pipeTimer = 0; }

    const speed = PIPE_SPEED + score * 8;   // get faster as score increases
    pipes.forEach(p => {
        p.x -= speed * dt;
        if (!p.scored && p.x + PIPE_W < canvas.width * 0.20) {
            p.scored = true;
            score++;
            liveScoreEl.textContent = score;
        }
    });
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    if (collides()) die();
}

function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawPipes();
    drawBike(bikeY);

    // Score on canvas
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(8, 8, 90, 28);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Segoe UI, Arial, sans-serif';
    ctx.fillText('Score: ' + score, 14, 27);
}

function loop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    update(dt);
    render();
    if (state === S.PLAY) requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════
   STATE TRANSITIONS
═══════════════════════════════════════════ */
function startGame() {
    initGame();
    state = S.PLAY;
    lastTime = null;
    overlay.classList.add('hidden');
    requestAnimationFrame(loop);
}

function die() {
    state = S.DEAD;
    if (score > best) best = score;
    overlayTitle.textContent = score === 0 ? 'Wiped Out!' : score > best - 1 ? '🏆 New Best!' : 'Crashed!';
    overlayMsg.innerHTML     = `You cleared <strong>${score}</strong> cactus${score !== 1 ? 'es' : ''}. ${score === 0 ? 'Try jumping!' : 'Nice riding!'}`;
    scoreDispEl.style.display = 'block';
    scoreDispEl.textContent   = 'Best: ' + best;
    startBtn.textContent      = '↺ Ride Again';
    overlay.classList.remove('hidden');
}

/* ── Input ── */
function jump() {
    if (state === S.DEAD)  return;
    if (state === S.IDLE)  { startGame(); return; }
    bikeVY = JUMP_VEL;
}

startBtn.addEventListener('click',   startGame);
canvas.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });
document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});

window.addEventListener('resize', () => {
    resize();
    calcConstants();
    if (state !== S.PLAY) { drawBackground(); }
});

/* ── Initial idle screen ── */
initGame();
drawBackground();
drawBike(bikeY);
</script>
</body>
</html>
